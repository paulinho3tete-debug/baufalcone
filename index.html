<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcone - Gestão com Webhook Discord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');
        :root { --mafia-red: #8b0000; --mafia-gold: #c5a059; --mafia-dark: #0a0a0a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--mafia-dark); color: #e2e8f0; background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); overflow-x: hidden; }
        h1, h2, h3, .mafia-font { font-family: 'Cinzel', serif; letter-spacing: 1px; }
        .mafia-card { background: linear-gradient(145deg, #161616, #0f0f0f); border: 1px solid #2a2a2a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mafia-border-gold { border-color: var(--mafia-gold); }
        .mafia-text-gold { color: var(--mafia-gold); }
        .mafia-btn-red { background: linear-gradient(to bottom, #8b0000, #5a0000); border: 1px solid #4a0000; transition: all 0.3s ease; }
        .mafia-btn-red:hover { filter: brightness(1.2); box-shadow: 0 0 15px rgba(139, 0, 0, 0.4); }
        .tab-active { color: var(--mafia-gold); border-bottom: 2px solid var(--mafia-gold); }
        input, select, textarea { background-color: #0f0f0f !important; border: 1px solid #333 !important; color: #ccc !important; }
        #shared-notes { min-height: 400px; font-family: 'Courier New', Courier, monospace; background-image: linear-gradient(#1a1a1a 1.1em, #222 1.2em); background-size: 100% 1.2em; }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="p-4 md:p-8 max-w-7xl mx-auto opacity-0 transition-opacity duration-500">
        
        <!-- LOGIN / REGISTO -->
        <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 hidden px-4">
            <div class="mafia-card p-8 md:p-10 rounded-none border-t-4 border-b-4 mafia-border-gold w-full max-w-md shadow-2xl">
                <div class="text-center mb-8">
                    <h2 class="text-4xl font-black mafia-text-gold uppercase mb-2">Falcone</h2>
                    <p class="text-slate-500 text-[10px] italic tracking-widest uppercase font-bold">Autenticação de Membro</p>
                </div>

                <div id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold mb-1 text-slate-500 uppercase tracking-tighter">ID do Passaporte</label>
                        <input type="number" id="login-citizenid" class="w-full rounded-none px-4 py-2">
                    </div>
                    <div id="login-admin-box" class="hidden">
                        <label class="block text-[10px] font-bold mb-1 text-amber-600 uppercase tracking-tighter">Senha Administrativa</label>
                        <input type="password" id="login-admin-pass" class="w-full rounded-none px-4 py-2 border-amber-900">
                    </div>
                    <button id="btn-login" class="w-full mafia-btn-red py-4 text-white mafia-font font-bold uppercase tracking-widest text-sm">Entrar</button>
                    <button onclick="toggleAuth('register')" class="w-full text-[9px] text-slate-500 uppercase underline mt-4">Novo Membro</button>
                </div>

                <div id="register-form" class="space-y-5 hidden">
                    <input type="text" id="reg-rpname" placeholder="Nome Completo (RP)" class="w-full rounded-none px-4 py-2">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="reg-citizenid" placeholder="ID" class="w-full rounded-none px-4 py-2">
                        <select id="reg-role" class="w-full rounded-none px-4 py-2 text-xs">
                            <option value="Membro">Membro</option>
                            <option value="Moderador">Moderador</option>
                            <option value="Administrador">Administrador</option>
                        </select>
                    </div>
                    <div id="reg-admin-key-box" class="hidden">
                        <input type="password" id="reg-admin-pass" placeholder="Senha da Hierarquia" class="w-full rounded-none px-4 py-2">
                    </div>
                    <button id="btn-register" class="w-full mafia-btn-red py-4 text-white mafia-font font-bold uppercase text-sm">Registrar</button>
                    <button onclick="toggleAuth('login')" class="w-full text-[9px] text-slate-500 uppercase underline mt-4">Já tenho conta</button>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4 border-b border-white/5 pb-6">
                <div>
                    <h1 class="text-3xl font-black mafia-text-gold uppercase tracking-tighter">Falcone Sincronizado</h1>
                    <p class="text-slate-500 text-xs">Acessando como: <span id="user-display" class="text-slate-300"></span> (<span id="role-display" class="mafia-text-gold"></span>)</p>
                </div>
                <nav class="flex gap-6 mafia-font text-[12px] uppercase font-bold overflow-x-auto w-full md:w-auto">
                    <button onclick="showSection('inventory')" id="tab-inventory" class="pb-2 tab-active">Baú</button>
                    <button onclick="showSection('notes')" id="tab-notes" class="pb-2 text-slate-500">Notas</button>
                    <button onclick="showSection('logs')" id="tab-logs" class="pb-2 text-slate-500">Histórico</button>
                    <button onclick="showSection('config')" id="tab-config" class="pb-2 text-slate-500 hidden">Configurações</button>
                </nav>
                <button onclick="logout()" class="text-red-700 text-[10px] font-bold uppercase underline">Sair</button>
            </header>

            <!-- Seções -->
            <section id="inventory-section">
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-10" id="inventory-grid"></div>
                <div class="mafia-card p-6">
                    <h3 class="mafia-font text-lg mafia-text-gold mb-4 uppercase">Movimentar</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <select id="move-item-select" class="px-4 py-2 text-sm"></select>
                        <input type="number" id="move-qty" placeholder="Quantidade" class="px-4 py-2 text-sm">
                        <select id="move-action" class="px-4 py-2 text-sm">
                            <option value="deposit">Guardar (+)</option>
                            <option value="withdraw">Retirar (-)</option>
                        </select>
                        <button id="btn-process-move" class="mafia-btn-red py-2 text-white font-bold uppercase text-xs">Confirmar</button>
                    </div>
                </div>
            </section>

            <section id="notes-section" class="hidden">
                <div class="mafia-card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="mafia-font text-lg mafia-text-gold uppercase">Quadro da Nuvem</h3>
                        <span id="saving-notes" class="hidden text-[10px] text-slate-500 uppercase italic">Salvando no Discord...</span>
                    </div>
                    <textarea id="shared-notes" class="w-full p-6 text-sm text-slate-300 resize-none rounded-none focus:ring-0"></textarea>
                </div>
            </section>

            <section id="logs-section" class="hidden">
                <div class="mafia-card overflow-hidden text-xs">
                    <table class="w-full text-left">
                        <thead class="bg-black/50 mafia-text-gold font-bold">
                            <tr><th class="p-4">Hora</th><th class="p-4">Membro</th><th class="p-4">Ação</th><th class="p-4">Item</th><th class="p-4">Qtd</th></tr>
                        </thead>
                        <tbody id="logs-table-body" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </section>

            <!-- Seção de Admin (Discord Webhook) -->
            <section id="config-section" class="hidden space-y-6">
                <div class="mafia-card p-6 border-l-4 border-amber-600">
                    <h3 class="mafia-font text-lg mafia-text-gold mb-4 uppercase">Integração Discord</h3>
                    <p class="text-[10px] text-slate-500 mb-4">Insira o link do Webhook para enviar os logs do baú para um canal do Discord.</p>
                    <div class="flex flex-col md:flex-row gap-4">
                        <input type="password" id="webhook-url" placeholder="https://discord.com/api/webhooks/..." class="flex-1 px-4 py-3 text-xs font-mono">
                        <button id="btn-save-webhook" class="bg-amber-700/20 border border-amber-600 px-6 py-3 text-[10px] font-bold uppercase hover:bg-amber-600 transition-colors">Salvar Webhook</button>
                    </div>
                </div>

                <div class="mafia-card p-6 border-l-4 mafia-border-gold">
                    <h3 class="mafia-font text-lg mafia-text-gold mb-4 uppercase">Gestão de Catálogo</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="new-item-name" placeholder="Nome do Item" class="px-4 py-2">
                        <input type="text" id="new-item-icon" placeholder="Emoji" class="px-4 py-2 text-center">
                        <button id="btn-add-item" class="bg-white/5 hover:bg-white/10 py-2 font-bold uppercase text-xs">Adicionar ao Sistema</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const ADMIN_PASS = "159753Falcone"; 
        
        const isPreview = typeof __firebase_config !== 'undefined';
        const config = isPreview ? JSON.parse(__firebase_config) : {
            apiKey: "COLE_AQUI_SEU_FIREBASE",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "12345678",
            appId: "1:1234:web:abc"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = isPreview ? __app_id : 'falcone-gestao-online';

        const getCol = (c) => collection(db, 'artifacts', appId, 'public', 'data', c);
        const getRef = (c, id) => doc(db, 'artifacts', appId, 'public', 'data', c, id);

        let user = JSON.parse(sessionStorage.getItem('f_user')) || null;
        let webhookUrl = "";

        // Autenticação
        async function initAuth() {
            if (isPreview && typeof __initial_auth_token !== 'undefined') {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }

        onAuthStateChanged(auth, (u) => {
            if (u) {
                document.getElementById('app').style.opacity = "1";
                if (user) initApp();
                else document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        initAuth();

        // App Central
        async function initApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.rpName;
            document.getElementById('role-display').innerText = user.role;
            
            if(user.role === 'Administrador') {
                document.getElementById('tab-config').classList.remove('hidden');
                const wSnap = await getDoc(getRef('config', 'discord'));
                if(wSnap.exists()) {
                    webhookUrl = wSnap.data().url;
                    document.getElementById('webhook-url').value = webhookUrl;
                }
            }

            // Listeners em Tempo Real
            onSnapshot(getCol('inventory'), (snap) => {
                const data = snap.docs.map(d => d.data());
                renderInventory(data);
                updateSelect(data);
            });

            onSnapshot(getCol('logs'), (snap) => {
                renderLogs(snap.docs.map(d => d.data()).sort((a,b) => b.timestamp?.seconds - a.timestamp?.seconds));
            });

            onSnapshot(getRef('metadata', 'notes'), (d) => {
                const el = document.getElementById('shared-notes');
                if(d.exists() && document.activeElement !== el) el.value = d.data().content;
            });
        }

        // --- Renderização ---
        function renderInventory(items) {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';
            items.filter(i => i.quantity > 0).forEach(i => {
                grid.innerHTML += `
                <div class="mafia-card p-4 text-center">
                    <div class="text-3xl mb-2">${i.icon}</div>
                    <div class="text-[8px] font-bold mafia-text-gold uppercase truncate">${i.label}</div>
                    <div class="text-2xl font-black">${i.quantity}</div>
                </div>`;
            });
        }

        function updateSelect(items) {
            const s = document.getElementById('move-item-select');
            const current = s.value;
            s.innerHTML = '<option value="">Escolher Item...</option>';
            items.sort((a,b) => a.label.localeCompare(b.label)).forEach(i => {
                s.innerHTML += `<option value="${i.id}">${i.icon} ${i.label}</option>`;
            });
            s.value = current;
        }

        function renderLogs(logs) {
            const body = document.getElementById('logs-table-body');
            body.innerHTML = '';
            logs.slice(0, 15).forEach(l => {
                const time = l.timestamp ? new Date(l.timestamp.seconds * 1000).toLocaleTimeString() : '...';
                body.innerHTML += `
                <tr>
                    <td class="p-4 text-slate-500 font-mono">${time}</td>
                    <td class="p-4 font-bold text-slate-300">${l.user}</td>
                    <td class="p-4 font-black ${l.type === '+' ? 'text-green-700' : 'text-red-800'}">${l.type === '+' ? 'GUARDOU' : 'RETIROU'}</td>
                    <td class="p-4 italic">${l.item}</td>
                    <td class="p-4 text-center mafia-text-gold">x${l.qty}</td>
                </tr>`;
            });
        }

        // --- Webhook Discord Logic ---
        async function sendToDiscord(message, color = 12976128) { // Default Gold color
            const snap = await getDoc(getRef('config', 'discord'));
            const url = snap.exists() ? snap.data().url : "";
            
            if(!url) return;

            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "🦅 Log do Sistema Falcone",
                            description: message,
                            color: color,
                            footer: { text: "Gestão Cloud Falcone" },
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
            } catch (e) { console.error("Discord Error", e); }
        }

        // --- Ações ---
        async function handleMove() {
            const id = document.getElementById('move-item-select').value;
            const qty = parseInt(document.getElementById('move-qty').value);
            const action = document.getElementById('move-action').value;

            if(!id || isNaN(qty) || qty <= 0) return;

            const itemRef = getRef('inventory', id);
            const snap = await getDoc(itemRef);
            const currentData = snap.data();
            let currentQty = snap.exists() ? currentData.quantity : 0;

            if(action === 'withdraw' && currentQty < qty) return alert("Quantidade insuficiente!");

            const finalQty = action === 'deposit' ? currentQty + qty : currentQty - qty;
            await setDoc(itemRef, { ...currentData, quantity: finalQty }, { merge: true });

            await addDoc(getCol('logs'), {
                user: user.rpName,
                item: currentData.label,
                qty,
                type: action === 'deposit' ? '+' : '-',
                timestamp: serverTimestamp()
            });

            // Log no Discord
            const dColor = action === 'deposit' ? 3066993 : 15158332; // Verde vs Vermelho
            const actionText = action === 'deposit' ? "guardou" : "retirou";
            sendToDiscord(`**Membro:** ${user.rpName} (ID: ${user.citizenId})\n**Ação:** ${actionText.toUpperCase()}\n**Item:** ${currentData.icon} ${currentData.label}\n**Quantidade:** x${qty}\n**Total no Baú:** ${finalQty}`, dColor);

            document.getElementById('move-qty').value = '';
        }

        async function handleAddLibrary() {
            const name = document.getElementById('new-item-name').value;
            const icon = document.getElementById('new-item-icon').value || "📦";
            if(!name) return;
            const id = name.toLowerCase().replace(/\s+/g, '_');
            await setDoc(getRef('inventory', id), { id, label: name, icon, quantity: 0 });
            document.getElementById('new-item-name').value = '';
            sendToDiscord(`🆕 **Novo Item Cadastrado:** ${icon} ${name} por ${user.rpName}`);
        }

        async function handleSaveWebhook() {
            const url = document.getElementById('webhook-url').value.trim();
            if(!url.includes("discord.com/api/webhooks")) return alert("URL de Webhook inválida.");
            await setDoc(getRef('config', 'discord'), { url });
            webhookUrl = url;
            alert("Webhook salvo com sucesso!");
            sendToDiscord("✅ **Sistema de Notificações Ativado!**");
        }

        // --- Auth Funcs ---
        async function handleLogin() {
            const cid = document.getElementById('login-citizenid').value;
            const snap = await getDoc(getRef('users', cid));
            if(!snap.exists()) return alert("ID não registrado.");
            
            const uData = snap.data();
            if(uData.role !== 'Membro') {
                const pBox = document.getElementById('login-admin-box');
                if(pBox.classList.contains('hidden')) {
                    pBox.classList.remove('hidden');
                    return alert("Cargos hierárquicos requerem senha.");
                }
                if(document.getElementById('login-admin-pass').value !== ADMIN_PASS) return alert("Senha errada.");
            }

            user = uData;
            sessionStorage.setItem('f_user', JSON.stringify(user));
            initApp();
        }

        async function handleRegister() {
            const rpName = document.getElementById('reg-rpname').value;
            const cid = document.getElementById('reg-citizenid').value;
            const role = document.getElementById('reg-role').value;
            const pass = document.getElementById('reg-admin-pass').value;

            if(!rpName || !cid) return alert("Preencha os campos.");
            if(role !== 'Membro' && pass !== ADMIN_PASS) return alert("Chave administrativa incorreta.");

            const uData = { rpName, citizenId: cid, role };
            await setDoc(getRef('users', cid), uData);
            user = uData;
            sessionStorage.setItem('f_user', JSON.stringify(user));
            initApp();
        }

        // --- Notas ---
        let nt;
        document.getElementById('shared-notes').addEventListener('input', (e) => {
            document.getElementById('saving-notes').classList.remove('hidden');
            clearTimeout(nt);
            nt = setTimeout(async () => {
                await setDoc(getRef('metadata', 'notes'), { content: e.target.value }, { merge: true });
                document.getElementById('saving-notes').classList.add('hidden');
            }, 1500);
        });

        // UI Helpers
        window.toggleAuth = (m) => {
            document.getElementById('login-form').classList.toggle('hidden', m==='register');
            document.getElementById('register-form').classList.toggle('hidden', m==='login');
        };

        window.showSection = (s) => {
            ['inventory', 'logs', 'config', 'notes'].forEach(id => {
                const sec = document.getElementById(id + '-section');
                if(sec) sec.classList.toggle('hidden', id !== s);
                const tab = document.getElementById('tab-' + id);
                if(tab) tab.classList.toggle('tab-active', id === s);
                if(tab) tab.classList.toggle('text-slate-500', id !== s);
            });
        };

        window.logout = () => { sessionStorage.removeItem('f_user'); location.reload(); };

        document.getElementById('btn-login').onclick = handleLogin;
        document.getElementById('btn-register').onclick = handleRegister;
        document.getElementById('btn-process-move').onclick = handleMove;
        document.getElementById('btn-add-item').onclick = handleAddLibrary;
        document.getElementById('btn-save-webhook').onclick = handleSaveWebhook;
        document.getElementById('reg-role').onchange = (e) => document.getElementById('reg-admin-key-box').classList.toggle('hidden', e.target.value === 'Membro');

    </script>
</body>
</html>
