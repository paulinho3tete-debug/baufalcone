<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcone - Sistema de Gestão Local</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --mafia-red: #8b0000;
            --mafia-gold: #c5a059;
            --mafia-dark: #0a0a0a;
            --mafia-slate: #1a1a1a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--mafia-dark); 
            color: #e2e8f0;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            overflow-x: hidden;
        }

        h1, h2, h3, .mafia-font { 
            font-family: 'Cinzel', serif; 
            letter-spacing: 1px;
        }

        .mafia-card { 
            background: linear-gradient(145deg, #161616, #0f0f0f);
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .mafia-border-gold { border-color: var(--mafia-gold); }
        .mafia-text-gold { color: var(--mafia-gold); }
        
        .mafia-btn-red {
            background: linear-gradient(to bottom, #8b0000, #5a0000);
            border: 1px solid #4a0000;
            transition: all 0.3s ease;
        }
        .mafia-btn-red:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.4);
        }

        .tab-active { 
            color: var(--mafia-gold);
            border-bottom: 2px solid var(--mafia-gold);
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        input, select, textarea {
            background-color: #0f0f0f !important;
            border: 1px solid #333 !important;
            color: #ccc !important;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--mafia-gold) !important;
            outline: none;
        }

        .smoke-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.05;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            z-index: -1;
        }

        #shared-notes {
            min-height: 400px;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.6;
            background-image: linear-gradient(#1a1a1a 1.1em, #222 1.2em);
            background-size: 100% 1.2em;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="smoke-bg"></div>
    
    <div id="app" class="p-4 md:p-8 max-w-7xl mx-auto transition-opacity duration-500">
        
        <!-- LOGIN / REGISTO -->
        <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 hidden px-4">
            <div class="mafia-card p-8 md:p-10 rounded-none border-t-4 border-b-4 mafia-border-gold w-full max-w-md shadow-2xl">
                <div class="text-center mb-8">
                    <h2 class="text-4xl font-black mafia-text-gold uppercase mb-2">Falcone</h2>
                    <div class="h-px bg-gradient-to-r from-transparent via-[#c5a059] to-transparent w-full mb-4"></div>
                    <p id="auth-title" class="text-slate-500 text-[10px] italic tracking-widest uppercase font-bold">Acesso Local de Segurança</p>
                </div>

                <div id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold mb-1 text-slate-500 uppercase tracking-tighter">Passaporte (ID)</label>
                        <input type="number" id="login-citizenid" placeholder="ID da Cidade" class="w-full rounded-none px-4 py-2">
                    </div>
                    <button onclick="handleLogin()" class="w-full mafia-btn-red py-4 text-white mafia-font font-bold uppercase tracking-widest text-sm">Entrar na Armaria</button>
                    <div class="text-center">
                        <button onclick="toggleAuth('register')" class="text-[9px] text-slate-500 hover:text-white uppercase tracking-widest underline">Criar Acesso Local</button>
                    </div>
                </div>

                <div id="register-form" class="space-y-5 hidden">
                    <div>
                        <label class="block text-[10px] font-bold mb-1 text-slate-500 uppercase tracking-tighter">Nome de Batismo (RP)</label>
                        <input type="text" id="reg-rpname" placeholder="Ex: Vito Scaletta" class="w-full rounded-none px-4 py-2">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold mb-1 text-slate-500 uppercase tracking-tighter">Passaporte (ID)</label>
                            <input type="number" id="reg-citizenid" class="w-full rounded-none px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold mb-1 text-slate-500 uppercase tracking-tighter">Hierarquia</label>
                            <select id="reg-role" class="w-full rounded-none px-4 py-2 text-white text-xs">
                                <option value="Administrador">Don (Admin)</option>
                                <option value="Moderador">Consigliere (Mod)</option>
                                <option value="Membro">Soldato (Membro)</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="handleRegister()" class="w-full mafia-btn-red py-4 text-white mafia-font font-bold uppercase tracking-widest text-sm">Prestar Juramento</button>
                    <div class="text-center">
                        <button onclick="toggleAuth('login')" class="text-[9px] text-slate-500 hover:text-white uppercase tracking-widest underline">Já tem acesso? Login</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4 border-b border-white/5 pb-6">
                <div>
                    <h1 class="text-3xl font-black mafia-text-gold uppercase tracking-tighter">La Famiglia <span class="text-white/20">|</span> Armaria</h1>
                    <div class="flex items-center gap-3 mt-2">
                        <span id="role-badge" class="px-2 py-0.5 text-[9px] font-bold uppercase tracking-widest border mafia-border-gold mafia-text-gold"></span>
                        <p class="text-slate-500 text-xs">Associado: <span id="user-display" class="text-slate-300 font-semibold"></span></p>
                    </div>
                </div>
                <nav class="flex gap-8 w-full md:w-auto overflow-x-auto mafia-font text-sm uppercase font-bold tracking-widest">
                    <button onclick="showSection('inventory')" id="tab-inventory" class="pb-2 px-1 transition-all tab-active">O Baú</button>
                    <button onclick="showSection('notes')" id="tab-notes" class="pb-2 px-1 transition-all text-slate-500">Quadro</button>
                    <button onclick="showSection('logs')" id="tab-logs" class="pb-2 px-1 transition-all text-slate-500">Registos</button>
                    <button onclick="showSection('manage')" id="tab-manage" class="pb-2 px-1 transition-all text-slate-500">Catálogo</button>
                </nav>
                <button onclick="logout()" class="text-red-800 text-[10px] hover:text-red-500 uppercase font-black tracking-widest underline">Encerrar Sessão</button>
            </header>

            <section id="inventory-section" class="space-y-10">
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6" id="inventory-grid"></div>
                <div class="mafia-card p-8 border-l-4 mafia-border-gold">
                    <h3 class="mafia-font text-xl mafia-text-gold mb-6 uppercase tracking-widest flex items-center gap-3">Movimentação</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <select id="move-item-select" class="rounded-none px-4 py-3 text-sm"></select>
                        <input type="number" id="move-qty" placeholder="Quantidade" class="rounded-none px-4 py-3 text-sm">
                        <select id="move-action" class="rounded-none px-4 py-3 text-sm">
                            <option value="deposit">Abastecer (+)</option>
                            <option value="withdraw">Retirar (-)</option>
                        </select>
                        <button onclick="processMovement()" class="mafia-btn-red py-3 text-white mafia-font font-bold uppercase text-sm tracking-widest text-center">Executar</button>
                    </div>
                </div>
            </section>

            <section id="notes-section" class="hidden">
                <div class="mafia-card p-6 md:p-10 border-t border-white/5 relative">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="mafia-font text-xl mafia-text-gold uppercase tracking-widest">Quadro de Avisos</h3>
                        <button onclick="clearNotes()" class="text-red-900 text-[9px] uppercase font-bold hover:text-red-500 underline">Limpar Quadro</button>
                    </div>
                    <textarea id="shared-notes" placeholder="Escreve aqui planos ou avisos..." class="w-full p-6 text-slate-300 border-none resize-none focus:ring-0 rounded-none text-sm"></textarea>
                </div>
            </section>

            <section id="logs-section" class="hidden">
                <div class="mafia-card overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-black/50 mafia-text-gold">
                            <tr><th class="p-5 uppercase text-[11px]">Momento</th><th class="p-5 uppercase text-[11px]">Soldato</th><th class="p-5 uppercase text-[11px]">Tipo</th><th class="p-5 uppercase text-[11px]">Item</th><th class="p-5 text-center text-[11px]">Qtd</th></tr>
                        </thead>
                        <tbody id="logs-table-body" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </section>

            <section id="manage-section" class="hidden space-y-8">
                <div class="mafia-card p-8 border-l-4 mafia-border-gold">
                    <h3 class="mafia-font text-xl mafia-text-gold mb-6 uppercase tracking-widest">Novo Item</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <input type="text" id="new-item-name" placeholder="Nome do Item" class="rounded-none px-4 py-3">
                        <input type="text" id="new-item-icon" placeholder="Emoji (Ex: 🔫)" class="rounded-none px-4 py-3 text-center">
                        <button onclick="registerNewItem()" class="bg-white/10 hover:bg-white/20 py-3 mafia-font font-bold uppercase text-sm">Registar no Catálogo</button>
                    </div>
                </div>
                <div id="library-list" class="flex flex-wrap gap-2"></div>
            </section>
        </div>
    </div>

    <script>
        // --- DATA STORE (LOCAL STORAGE) ---
        const STORE = {
            get: (key) => JSON.parse(localStorage.getItem('falcone_' + key)) || [],
            save: (key, data) => localStorage.setItem('falcone_' + key, JSON.stringify(data)),
            getObj: (key) => JSON.parse(localStorage.getItem('falcone_' + key)) || {}
        };

        let currentUser = JSON.parse(sessionStorage.getItem('mafia_user')) || null;

        // --- AUTH ---
        window.toggleAuth = (m) => {
            document.getElementById('login-form').classList.toggle('hidden', m==='register');
            document.getElementById('register-form').classList.toggle('hidden', m==='login');
        };

        window.handleLogin = () => {
            const cid = document.getElementById('login-citizenid').value;
            const users = STORE.get('users');
            const user = users.find(u => u.citizenId === cid);
            
            if(user) {
                currentUser = user;
                sessionStorage.setItem('mafia_user', JSON.stringify(user));
                initDashboard();
            } else notify("ID não encontrado neste dispositivo.", "error");
        };

        window.handleRegister = () => {
            const rpName = document.getElementById('reg-rpname').value.trim();
            const cid = document.getElementById('reg-citizenid').value.trim();
            const role = document.getElementById('reg-role').value;

            if(!rpName || !cid) return notify("Preencha tudo.", "error");

            const users = STORE.get('users');
            if(users.some(u => u.citizenId === cid)) return notify("ID já registado.", "error");

            const newUser = { rpName, citizenId: cid, role };
            users.push(newUser);
            STORE.save('users', users);
            
            currentUser = newUser;
            sessionStorage.setItem('mafia_user', JSON.stringify(newUser));
            initDashboard();
        };

        window.logout = () => {
            sessionStorage.removeItem('mafia_user');
            location.reload();
        };

        // --- DASHBOARD ---
        function initDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser.rpName;
            document.getElementById('role-badge').innerText = currentUser.role;
            
            renderInventory();
            renderLogs();
            renderLibrary();
            loadNotes();
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            const inv = STORE.get('inventory');
            grid.innerHTML = '';
            inv.filter(i => i.quantity > 0).forEach(i => {
                grid.innerHTML += `
                    <div class="mafia-card p-6 text-center border-t border-white/5">
                        <div class="text-4xl mb-4">${i.icon}</div>
                        <div class="text-[9px] font-black mafia-text-gold uppercase mb-1">${i.label}</div>
                        <div class="text-3xl font-black text-white">${i.quantity}</div>
                    </div>`;
            });
        }

        function renderLibrary() {
            const select = document.getElementById('move-item-select');
            const list = document.getElementById('library-list');
            const lib = STORE.get('library');
            
            list.innerHTML = '';
            select.innerHTML = '<option value="">Selecionar Item...</option>';
            
            lib.forEach(item => {
                select.innerHTML += `<option value="${item.id}">${item.icon} ${item.label}</option>`;
                list.innerHTML += `<div class="bg-black/40 border border-white/5 px-3 py-1 text-[10px] uppercase text-slate-400">${item.icon} ${item.label}</div>`;
            });
        }

        function renderLogs() {
            const body = document.getElementById('logs-table-body');
            const logs = STORE.get('logs');
            body.innerHTML = '';
            logs.reverse().slice(0, 15).forEach(l => {
                body.innerHTML += `
                    <tr>
                        <td class="p-4 text-[10px] text-slate-500 font-mono">${l.time}</td>
                        <td class="p-4 text-xs font-bold text-slate-300">${l.user}</td>
                        <td class="p-4 text-[10px] font-black ${l.type === '+' ? 'text-green-700' : 'text-red-800'}">${l.type === '+' ? 'ABASTECEU' : 'RETIROU'}</td>
                        <td class="p-4 text-xs italic">${l.item}</td>
                        <td class="p-4 text-center font-black mafia-text-gold">x${l.qty}</td>
                    </tr>`;
            });
        }

        // --- ACTIONS ---
        window.processMovement = () => {
            const id = document.getElementById('move-item-select').value;
            const qty = parseInt(document.getElementById('move-qty').value);
            const action = document.getElementById('move-action').value;
            
            if(!id || isNaN(qty) || qty <= 0) return notify("Dados inválidos.", "error");

            let inv = STORE.get('inventory');
            let lib = STORE.get('library');
            const itemBase = lib.find(l => l.id === id);
            let itemInv = inv.find(i => i.id === id);

            if(!itemInv) {
                itemInv = { ...itemBase, quantity: 0 };
                inv.push(itemInv);
            }

            if(action === 'withdraw' && itemInv.quantity < qty) return notify("Stock insuficiente.", "error");

            itemInv.quantity += (action === 'deposit' ? qty : -qty);
            STORE.save('inventory', inv);

            // Log
            const logs = STORE.get('logs');
            logs.push({
                time: new Date().toLocaleTimeString(),
                user: currentUser.rpName,
                type: action === 'deposit' ? '+' : '-',
                item: itemBase.label,
                qty: qty
            });
            STORE.save('logs', logs);

            renderInventory();
            renderLogs();
            notify("Operação concluída.", "success");
        };

        window.registerNewItem = () => {
            const name = document.getElementById('new-item-name').value;
            const icon = document.getElementById('new-item-icon').value || "📦";
            if(!name) return;

            const lib = STORE.get('library');
            const id = name.toLowerCase().replace(/\s+/g, '_');
            if(lib.some(l => l.id === id)) return notify("Item já existe.", "error");

            lib.push({ id, label: name, icon });
            STORE.save('library', lib);
            renderLibrary();
            notify("Catálogo atualizado.", "success");
        };

        // --- NOTES ---
        function loadNotes() {
            document.getElementById('shared-notes').value = localStorage.getItem('falcone_notes') || "";
        }

        document.getElementById('shared-notes').addEventListener('input', (e) => {
            localStorage.setItem('falcone_notes', e.target.value);
        });

        window.clearNotes = () => {
            if(confirm("Apagar quadro?")) {
                localStorage.removeItem('falcone_notes');
                document.getElementById('shared-notes').value = "";
            }
        };

        window.showSection = (s) => {
            ['inventory', 'logs', 'manage', 'notes'].forEach(id => {
                document.getElementById(id + '-section').classList.toggle('hidden', id !== s);
                document.getElementById('tab-' + id).classList.toggle('tab-active', id === s);
            });
        };

        function notify(m, t) {
            const d = document.createElement('div');
            d.className = `fixed bottom-6 right-6 px-6 py-3 border-l-4 text-[10px] z-[300] shadow-2xl ${t==='error'?'bg-red-950 border-red-600 text-red-400':'bg-black border-amber-600 text-amber-500'}`;
            d.innerText = m.toUpperCase();
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 3000);
        }

        window.onload = () => {
            if(currentUser) initDashboard();
            else document.getElementById('auth-screen').classList.remove('hidden');
        };
    </script>
</body>
</html>
